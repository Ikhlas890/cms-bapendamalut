<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="card">
    <div class="flex justify-between mb-3">
        <p-button *ngIf="permission.can_create" label="Tambah" icon="pi pi-plus" (click)="openAdd()"></p-button>
    </div>

    <p-table
        #dt
        [value]="clients"
        [paginator]="true"
        [rows]="10"
        [rowsPerPageOptions]="[5,10,20]"
        [loading]="loading"
        responsiveLayout="scroll"
        [globalFilterFields]="['nama_instansi','slug']"
        [sortField]="'nama_instansi'"
        [sortOrder]="1"
        class="p-datatable-gridlines p-datatable-sm"
    >
        <ng-template pTemplate="caption">
            <div class="flex items-center justify-between">
                <h5 class="m-0">Group Users</h5>
                <p-iconfield>
                    <p-inputicon class="pi pi-search" />
                    <input pInputText type="text" placeholder="Search" (input)="onGlobalFilter(dt, $event)" />
                </p-iconfield>
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="nama_instansi">Nama Instansi <p-sortIcon field="nama_instansi"></p-sortIcon></th>
                <th pSortableColumn="slug">Slug <p-sortIcon field="slug"></p-sortIcon></th>
                <th *ngIf="permission.can_update || permission.can_delete">Aksi</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-client>
            <tr>
                <td>{{ client.nama_instansi }}</td>
                <td>{{ client.slug }}</td>
                <td *ngIf="permission.can_update || permission.can_delete">
                    <button *ngIf="permission.can_update" pButton icon="pi pi-pencil" class="p-button-text p-button-sm mr-2" (click)="openEdit(client)"></button>
                    <button *ngIf="permission.can_delete" pButton icon="pi pi-trash" class="p-button-text p-button-danger p-button-sm" (click)="delete(client)"></button>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog header="{{ dialogTitle }}" [(visible)]="dialogVisible" [modal]="true" [style]="{ width: '520px' }">
    <form [formGroup]="form" (ngSubmit)="save()">
        <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-2">
                <label>Nama Instansi</label>
                <input pInputText formControlName="nama_instansi" />
            </div>

            <div class="flex justify-end mt-3">
                <button pButton type="button" label="Batal" class="p-button-text mr-2" (click)="dialogVisible=false"></button>
                <button pButton type="submit" label="Simpan" [disabled]="form.invalid || (selectedId ? !permission.can_update : !permission.can_create)"></button>
            </div>
        </div>
    </form>
</p-dialog>
